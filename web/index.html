<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemitAI — Send Money Home</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0f1e;
  --surface:  #111827;
  --surface2: #1a2234;
  --border:   rgba(255,255,255,0.08);
  --accent:   #3b82f6;
  --green:    #10b981;
  --red:      #ef4444;
  --text:     #f1f5f9;
  --muted:    #64748b;
  --sans:     'Sora', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: white;
}
.logo-name { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
.logo-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }
.status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--green);
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.3; }
}
.main { display: flex; flex: 1; overflow: hidden; }
.chat-panel {
  flex: 1; display: flex;
  flex-direction: column; overflow: hidden;
}
.messages {
  flex: 1; overflow-y: auto;
  padding: 1.25rem; display: flex;
  flex-direction: column; gap: 1rem;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 2px;
}
.msg { display: flex; flex-direction: column; max-width: 78%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }
.msg-label {
  font-size: 10px; color: var(--muted);
  margin-bottom: 3px; text-transform: uppercase;
  letter-spacing: 0.06em; font-weight: 500;
}
.msg-bubble {
  padding: 0.7rem 0.95rem;
  border-radius: 14px;
  font-size: 13.5px; line-height: 1.65;
  white-space: pre-wrap;
}
.msg.user .msg-bubble {
  background: #1e40af; color: white;
  border-bottom-right-radius: 4px;
}
.msg.agent .msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg { animation: fadeUp 0.25s ease; }
.typing {
  display: flex; gap: 5px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px; border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform:translateY(0); opacity:0.4; }
  30%          { transform:translateY(-5px); opacity:1; }
}
.card {
  margin-top: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 11px; padding: 0.9rem;
  font-size: 12.5px; animation: fadeUp 0.25s ease;
}
.card-title {
  font-size: 9.5px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent);
  font-weight: 500; margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px;
}
.card-title::before {
  content: ''; width: 5px; height: 5px;
  border-radius: 50%; background: var(--accent);
  display: inline-block;
}
.row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.row:last-of-type { border-bottom: none; }
.row-label { color: var(--muted); }
.row-val { font-family: var(--mono); font-weight: 500; }
.green { color: var(--green); }
.red   { color: var(--red); }
.blue  { color: var(--accent); }
.savings {
  margin-top: 8px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.25);
  border-radius: 7px; padding: 6px 10px;
  font-size: 12px; color: var(--green);
  text-align: center; font-weight: 500;
}
.tx-id {
  margin-top: 7px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 7px; padding: 6px 9px;
  font-size: 11px; color: var(--accent);
  font-family: var(--mono); word-break: break-all;
}
.input-area {
  padding: 0.9rem 1.25rem;
  border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 0.7rem 0.9rem;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13.5px;
  resize: none; outline: none;
  min-height: 42px; max-height: 110px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }
.btn {
  width: 42px; height: 42px;
  border-radius: 11px; border: none;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.btn:hover  { transform: scale(1.06); }
.btn:active { transform: scale(0.94); }
.btn-send {
  background: var(--accent); color: white;
}
.btn-send:disabled {
  opacity: 0.35; cursor: not-allowed; transform: none;
}
.btn-mic {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-mic.on {
  background: rgba(239,68,68,0.12);
  border-color: var(--red); color: var(--red);
  animation: mic-ring 1s infinite;
}
@keyframes mic-ring {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.35); }
  50%      { box-shadow: 0 0 0 7px rgba(239,68,68,0); }
}
.side {
  width: 270px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sec { padding: 1.1rem; border-bottom: 1px solid var(--border); }
.sec-title {
  font-size: 9.5px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted);
  font-weight: 500; margin-bottom: 10px;
}
.demo-btn {
  width: 100%; padding: 7px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: var(--sans); font-size: 12px;
  cursor: pointer; text-align: left;
  margin-bottom: 5px; transition: all 0.15s;
}
.demo-btn:hover { border-color: var(--accent); color: var(--accent); }
.pills { display: flex; flex-wrap: wrap; gap: 5px; }
.pill {
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer; color: var(--muted);
  transition: all 0.15s;
}
.pill:hover, .pill.on {
  background: rgba(59,130,246,0.12);
  border-color: var(--accent); color: var(--accent);
}
.stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12.5px; }
.stat-label { color: var(--muted); }
.stat-val   { font-family: var(--mono); font-size: 12px; font-weight: 500; }
.history    { display: flex; flex-direction: column; gap: 7px; }
.h-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 9px; font-size: 12px;
}
.h-id   { font-family: var(--mono); color: var(--accent); font-size: 10px; margin-bottom: 2px; }
.h-info { color: var(--muted); }
.empty  { color: var(--muted); font-size: 12px; text-align: center; padding: 0.75rem 0; }
.new-btn {
  margin: 0.9rem;
  padding: 7px; background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted);
  font-family: var(--sans); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
  width: calc(100% - 1.8rem);
}
.new-btn:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 700px) { .side { display: none; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">R</div>
    <div>
      <div class="logo-name">RemitAI</div>
      <div class="logo-sub">Stablecoin Remittance · Azure AI Foundry</div>
    </div>
  </div>
  <div class="status">
    <div class="dot"></div>
    Live · USDC on ETH-Sepolia
  </div>
</header>

<div class="main">

  <div class="chat-panel">
    <div class="messages" id="msgs"></div>
    <div class="input-area">
      <div class="input-row">
        <button class="btn btn-mic" id="micBtn" title="Voice input" onclick="toggleMic()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <textarea
          id="box"
          placeholder="Type a message or click the mic..."
          rows="1"
          onkeydown="onKey(event)"
          oninput="resize(this)"
        ></textarea>
        <button class="btn btn-send" id="sendBtn" onclick="send()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2"  x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="side">

    <div class="sec">
      <div class="sec-title">Quick demo</div>
      <button class="demo-btn" onclick="fill('I want to send $200 to my mom Maria in Mexico')">
        Send $200 → Mexico
      </button>
      <button class="demo-btn" onclick="fill('Quiero mandar $150 a mi familia en Colombia')">
        Enviar $150 → Colombia
      </button>
      <button class="demo-btn" onclick="fill('I want to send $300 to Philippines')">
        Send $300 → Philippines
      </button>
      <button class="demo-btn" onclick="fill('Send $100 to my family in India')">
        Send $100 → India
      </button>
    </div>

    <div class="sec">
      <div class="sec-title">Voice language</div>
      <div class="pills">
        <span class="pill on"  onclick="setLang('en-US',this)">EN</span>
        <span class="pill"     onclick="setLang('es-MX',this)">ES</span>
        <span class="pill"     onclick="setLang('hi-IN',this)">HI</span>
        <span class="pill"     onclick="setLang('tl-PH',this)">TL</span>
        <span class="pill"     onclick="setLang('ar-SA',this)">AR</span>
        <span class="pill"     onclick="setLang('fr-FR',this)">FR</span>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Session stats</div>
      <div class="stat">
        <span class="stat-label">Messages</span>
        <span class="stat-val" id="sMsg">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Transfers</span>
        <span class="stat-val" id="sTx">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total saved</span>
        <span class="stat-val green" id="sSaved">$0.00</span>
      </div>
    </div>

    <div class="sec" style="flex:1">
      <div class="sec-title">Transfer history</div>
      <div class="history" id="hist">
        <div class="empty">No transfers yet</div>
      </div>
    </div>

    <button class="new-btn" onclick="newChat()">+ New conversation</button>

  </div>
</div>

<script>
const API = window.location.origin + '/api'
const FUNCTIONS_URL = 'https://cognizantremitaifunction-hugqdxhuaef5dhbj.eastus-01.azurewebsites.net/api'
const FUNC_KEY      = 'zqehkgw3Cu5C1XzaDgmo_pniL4Xuhg-oWbThJnT4LIr4AzFutMVtbQ=='

let threadId  = null
let busy      = false
let listening = false
let recog     = null
let lang      = 'en-US'
let nMsg = 0, nTx = 0, saved = 0

async function init() {
  try {
    const r = await fetch(FUNCTIONS_URL + '/create_thread', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' }
    })
    const d  = await r.json()
    threadId = d.thread_id
    console.log('Thread:', threadId)
  } catch(e) {
    console.error('Init failed:', e)
    addMsg('agent', 'Could not connect. Please refresh the page.')
  }
}

function addMsg(role, text, tools) {
  const c = document.getElementById('msgs')
  const w = document.createElement('div')
  w.className = 'msg ' + role

  const lbl = document.createElement('div')
  lbl.className = 'msg-label'
  lbl.textContent = role === 'user' ? 'You' : 'RemitAI'

  const b = document.createElement('div')
  b.className = 'msg-bubble'
  b.textContent = text

  w.appendChild(lbl)
  w.appendChild(b)

  if (tools && tools.length) {
    tools.forEach(t => {
      const card = makeCard(t)
      if (card) w.appendChild(card)
    })
  }

  c.appendChild(w)
  c.scrollTop = c.scrollHeight
  nMsg++
  document.getElementById('sMsg').textContent = nMsg
}

function makeCard(t) {
  const n = t.name
  const r = t.result
  if (r.error) return null

  const card = document.createElement('div')
  card.className = 'card'

  if (n === 'get_fx_rate') {
    card.innerHTML =
      '<div class="card-title">Live FX rate</div>' +
      row('Amount',        '$' + r.amount_usd + ' USD',          'blue') +
      row('Recipient gets', r.local_amount + ' ' + r.target_currency, '') +
      row('Rate',          '1 USD = ' + r.exchange_rate + ' ' + r.target_currency, '') +
      row('RemitAI fee',   '$' + r.remitai_fee_usd,              'green') +
      row('Western Union', '$' + r.legacy_fee_usd,               'red') +
      '<div class="savings">You save $' + r.savings_usd + ' vs Western Union</div>'
    saved += parseFloat(r.savings_usd) || 0
    document.getElementById('sSaved').textContent = '$' + saved.toFixed(2)
  }

  else if (n === 'execute_transfer') {
    card.innerHTML =
      '<div class="card-title">Transfer — ' + (r.status || 'INITIATED') + '</div>' +
      row('Amount',    '$' + r.amount_usd + ' USDC', 'blue') +
      row('Recipient', r.recipient_name,              '') +
      row('Country',   r.destination_country,         '') +
      row('Delivery',  r.estimated_delivery,          'green') +
      '<div class="tx-id">TX: ' + r.transaction_id + '</div>'
    nTx++
    document.getElementById('sTx').textContent = nTx
    addHistory(r)
  }

  else if (n === 'send_email_confirmation') {
    card.innerHTML =
      '<div class="card-title">Emails sent</div>' +
      row('Sender email',    'Delivered', 'green') +
      row('Recipient email', 'Delivered', 'green')
  }

  return card
}

function row(label, val, cls) {
  return '<div class="row"><span class="row-label">' + label +
         '</span><span class="row-val ' + cls + '">' + val + '</span></div>'
}

function addHistory(r) {
  const h = document.getElementById('hist')
  const e = h.querySelector('.empty')
  if (e) e.remove()
  const item = document.createElement('div')
  item.className = 'h-item'
  item.innerHTML = '<div class="h-id">' + r.transaction_id + '</div>' +
                   '<div class="h-info">$' + r.amount_usd + ' → ' + r.destination_country + '</div>'
  h.insertBefore(item, h.firstChild)
}

function showTyping() {
  const c = document.getElementById('msgs')
  const w = document.createElement('div')
  w.className = 'msg agent'
  w.id = 'typing'
  w.innerHTML = '<div class="msg-label">RemitAI</div>' +
                '<div class="typing"><span></span><span></span><span></span></div>'
  c.appendChild(w)
  c.scrollTop = c.scrollHeight
}

function hideTyping() {
  const el = document.getElementById('typing')
  if (el) el.remove()
}

async function send() {
  const box  = document.getElementById('box')
  const text = box.value.trim()
  if (!text || busy || !threadId) return

  box.value = ''
  box.style.height = 'auto'
  busy = true
  document.getElementById('sendBtn').disabled = true

  addMsg('user', text)
  showTyping()

  try {
    const res = await fetch(FUNCTIONS_URL + '/chat_handler', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, thread_id: threadId })
    })
    const data = await res.json()
    hideTyping()

    if (data.error) {
      addMsg('agent', 'Error: ' + data.error)
    } else {
      addMsg('agent', data.response, data.tool_results)
      speak(data.response)
    }
  } catch(e) {
    hideTyping()
    addMsg('agent', 'Connection error. Is the server running?')
    console.error(e)
  }

  busy = false
  document.getElementById('sendBtn').disabled = false
  document.getElementById('box').focus()
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    send()
  }
}

function resize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 110) + 'px'
}

function fill(text) {
  const box = document.getElementById('box')
  box.value = text
  box.focus()
  resize(box)
}

function setLang(l, el) {
  lang = l
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'))
  el.classList.add('on')
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input requires Chrome. Please use Chrome browser.')
    return
  }
  listening ? stopMic() : startMic()
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  recog = new SR()
  recog.lang = lang
  recog.continuous = false
  recog.interimResults = true

  const btn = document.getElementById('micBtn')
  const box = document.getElementById('box')

  recog.onstart = () => {
    listening = true
    btn.classList.add('on')
    box.placeholder = 'Listening...'
  }

  recog.onresult = e => {
    let t = ''
    for (let i = e.resultIndex; i < e.results.length; i++) {
      t += e.results[i][0].transcript
    }
    box.value = t
    resize(box)
  }

  recog.onend = () => {
    listening = false
    btn.classList.remove('on')
    box.placeholder = 'Type a message or click the mic...'
    if (box.value.trim()) send()
  }

  recog.onerror = e => {
    listening = false
    btn.classList.remove('on')
    box.placeholder = 'Type a message or click the mic...'
    console.error('Mic error:', e.error)
    if (e.error === 'not-allowed') {
      alert('Microphone blocked. Click the camera/mic icon in Chrome address bar and allow access.')
    }
  }

  recog.start()
}

function stopMic() {
  if (recog) recog.stop()
}

function speak(text) {
  if (!window.speechSynthesis) return
  window.speechSynthesis.cancel()
  const clean = text
    .replace(/[\u{1F600}-\u{1F64F}]/gu, '')
    .replace(/[\u{1F300}-\u{1F5FF}]/gu, '')
    .replace(/[\u{1F680}-\u{1F6FF}]/gu, '')
    .replace(/[\u{1F700}-\u{1F77F}]/gu, '')
    .replace(/[\u{1F780}-\u{1F7FF}]/gu, '')
    .replace(/[\u{1F800}-\u{1F8FF}]/gu, '')
    .replace(/[\u{1F900}-\u{1F9FF}]/gu, '')
    .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '')
    .replace(/[\u{2600}-\u{26FF}]/gu, '')
    .replace(/[\u{2700}-\u{27BF}]/gu, '')
    .replace(/[#*`_]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .substring(0, 400)
  const u     = new SpeechSynthesisUtterance(clean)
  const map   = {
    'en-US': 'en-US', 'es-MX': 'es-MX',
    'hi-IN': 'hi-IN', 'tl-PH': 'fil-PH',
    'ar-SA': 'ar-SA', 'fr-FR': 'fr-FR'
  }
  u.lang  = map[lang] || 'en-US'
  u.rate  = 1.0
  window.speechSynthesis.speak(u)
}

async function newChat() {
  window.speechSynthesis && window.speechSynthesis.cancel()
  document.getElementById('msgs').innerHTML    = ''
  document.getElementById('hist').innerHTML    = '<div class="empty">No transfers yet</div>'
  document.getElementById('sMsg').textContent  = '0'
  document.getElementById('sTx').textContent   = '0'
  document.getElementById('sSaved').textContent = '$0.00'
  nMsg = 0; nTx = 0; saved = 0
  await init()
  setTimeout(() => addMsg('agent',
    "Hello! I'm RemitAI. I can help you send money home quickly and cheaply using USDC stablecoins — fees under $0.20, delivery under 60 seconds. How can I help you today?"
  ), 300)
}

window.addEventListener('load', async () => {
  await init()
  setTimeout(() => addMsg('agent',
